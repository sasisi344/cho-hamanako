name: Deploy Hamanako

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

defaults:
  run:
    working-directory: .

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🛡️ Fix Dubious Ownership
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 💾 Setup Astro Build Cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules/.astro
            node_modules/.cache
          key: ${{ runner.os }}-astro-build-hamanako-${{ hashFiles('package-lock.json') }}-${{ github.run_number }}
          restore-keys: |
            ${{ runner.os }}-astro-build-hamanako-${{ hashFiles('package-lock.json') }}-
            ${{ runner.os }}-astro-build-hamanako-

      - name: 🛠️ Generate Redirects & htaccess
        run: |
          node generate_redirects.mjs > redirects.json
          node scripts/generate_htaccess.js

      - name: 🔨 Build Astro Project
        run: npm run build

      - name: 🚀 Deploy via FTP (Diff only)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.HAMANAKO_FTP_SERVER || secrets.FTP_SERVER }}
          username: ${{ secrets.HAMANAKO_FTP_USERNAME || secrets.FTP_USERNAME }}
          password: ${{ secrets.HAMANAKO_FTP_PASSWORD || secrets.FTP_PASSWORD }}
          local-dir: dist/
          server-dir: /cho-hamanako.info/public_html/
          state-name: .ftp-deploy-sync-state-hamanako.json
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/~partytown/**
